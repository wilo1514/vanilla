@'services:postgres:image: postgres:16-alpinecontainer_name: vanilla_postgresrestart: unless-stoppedenvironment:POSTGRES_USER: ${POSTGRES_USER}POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}POSTGRES_DB: ${POSTGRES_DB}ports:- "5434:5432"volumes:- postgres_data:/var/lib/postgresql/dataautomation-api:image: node:20-alpinecontainer_name: vanilla_automation_apirestart: unless-stoppedworking_dir: /appcommand: sh -c "npm install && npm run dev"ports:- "3009:3009"environment:PORT: 3009DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}NODE_ENV: developmentvolumes:- ../automation:/appdepends_on:- postgresn8n:image: docker.n8n.io/n8nio/n8n:latestcontainer_name: vanilla_n8nrestart: unless-stoppedports:- "5678:5678"environment:DB_TYPE: postgresdbDB_POSTGRESDB_HOST: postgresDB_POSTGRESDB_PORT: 5432DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}DB_POSTGRESDB_USER: ${POSTGRES_USER}DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}      N8N_HOST: ${N8N_HOST}      N8N_PORT: ${N8N_PORT}      N8N_PROTOCOL: ${N8N_PROTOCOL}      WEBHOOK_URL: ${WEBHOOK_URL}      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}      TZ: ${TZ}      N8N_SECURE_COOKIE: "false"      N8N_DIAGNOSTICS_ENABLED: "false"      N8N_PERSONALIZATION_ENABLED: "false"      AUTOMATION_API_URL: ${AUTOMATION_API_URL}    volumes:      - n8n_data:/home/node/.n8n      - ./local-files:/files    depends_on:      - postgres      - automation-apivolumes:postgres_data:n8n_data:'@ | Set-Content -Encoding UTF8 .\docker-compose.yml